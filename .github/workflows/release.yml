name: Release

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build all 3 configs as..."
        required: true
        default: "Release"
        type: choice
        options:
          - "Release"
          - "Debug"
      source_1062:
        description: "Frosty repo for 1.0.6.2 or Earlier (owner/repo@ref, blank = CadeEvs@1.0.6.2, blank ref = default branch)"
        required: true
        default: "CadeEvs/FrostyToolsuite@1.0.6.2"
        type: string
      source_1063:
        description: "Frosty repo for 1.0.6.3 or Later (owner/repo@ref, blank = CadeEvs@1.0.6.4, blank ref = default branch)"
        required: true
        default: "CadeEvs/FrostyToolsuite@1.0.6.4"
        type: string
      source_107:
        description: "Frosty repo for 1.0.7 (owner/repo@ref, blank = CadeEvs@1.0.7, blank ref = default branch)"
        required: true
        default: "CadeEvs/FrostyToolsuite@1.0.7"
        type: string

jobs:
  prepare:
    runs-on: windows-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content "FsLocalizationPlugin.csproj" -Raw
          if ($content -notmatch '<Version>(.*?)</Version>') {
            throw "Could not find <Version> in FsLocalizationPlugin.csproj"
          }
          "version=$($Matches[1])" >> $env:GITHUB_OUTPUT
          "tag=v$($Matches[1])"    >> $env:GITHUB_OUTPUT

      - name: Build matrix
        id: matrix
        shell: pwsh
        run: |
          function Parse-Source($raw, $label) {
            $parts = $raw -split '@', 2
            return @{ repo = $parts[0].Trim(); ref = if ($parts.Count -gt 1) { $parts[1].Trim() } else { "" } }
          }

          $buildType = "${{ inputs.build_type }}"
          $outputRoot = if ($buildType -eq "Debug") { "bin\DeveloperDebug" } else { "bin\ReleaseFinal" }

          # Keep this table in sync with FsLocalizationPlugin.csproj's OutputPath values.
          $families = @(
            @{ suffix = "1.0.6.2orEarlier"; versionLabel = "1.0.6.2 or Earlier"; sourceRaw = "${{ inputs.source_1062 }}" }
            @{ suffix = "1.0.6.3orLater";   versionLabel = "1.0.6.3 or Later";   sourceRaw = "${{ inputs.source_1063 }}" }
            @{ suffix = "1.0.7";            versionLabel = "1.0.7";             sourceRaw = "${{ inputs.source_107 }}"  }
          )

          $include = @()
          foreach ($family in $families) {
            $config = "$buildType - $($family.versionLabel)"
            $parsed = Parse-Source $family.sourceRaw $config
            $include += @{
              config     = $config
              suffix     = $family.suffix
              outputPath = "$outputRoot\$($family.suffix)\"
              repo       = $parsed.repo
              ref        = $parsed.ref
            }
          }

          $json = ($include | ConvertTo-Json -Compress -AsArray)
          "matrix={`"include`":$json}" >> $env:GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout FlammenwerferPlugin repo
        uses: actions/checkout@v7
        with:
          path: FrostyFlammenwerferPlugin

      - name: Checkout Frosty repo (${{ matrix.config }})
        uses: actions/checkout@v7
        with:
          repository: ${{ matrix.repo }}
          ref: ${{ matrix.ref }}
          submodules: recursive
          path: FrostyToolsuite

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Install Windows SDK (if required)
        shell: pwsh
        run: |
          $vcxprojPath = "FrostyToolsuite\FrostyHash\FrostyHash.vcxproj"
          $content = Get-Content $vcxprojPath -Raw
          if ($content -notmatch '<WindowsTargetPlatformVersion>([\d\.]+)</WindowsTargetPlatformVersion>') {
            Write-Host "Skipping. No WindowsTargetPlatformVersion found in $vcxprojPath"
            exit 0
          }
          $requestedVersion = $Matches[1]
          Write-Host "FrostyHash.vcxproj requests Windows SDK $requestedVersion"

          # Match on the first 3 components (major.minor.build) only
          if ($requestedVersion -notmatch '^(\d+\.\d+\.\d+)(?:\.\d+)?$') {
            Write-Host "Skipping. Version is unversioned/generic ('$requestedVersion'). MSBuild will auto resolve this."
            exit 0
          }
          $requestedPrefix = $Matches[1]

          function Test-SdkVersion($version, $prefix) {
            return ($version -eq $prefix) -or ($version -like "$prefix.*")
          }

          $sdkIncludeRoot = "C:\Program Files (x86)\Windows Kits\10\Include"
          $installed = if (Test-Path $sdkIncludeRoot) {
            Get-ChildItem $sdkIncludeRoot -Directory | Where-Object { Test-SdkVersion $_.Name $requestedPrefix } | Select-Object -First 1
          } else { $null }
          if ($installed) {
            Write-Host "Skipping. Windows SDK $($installed.Name) already covers requested $requestedPrefix."
            exit 0
          }

          # Download standalone installer package for legacy Windows SDK
          # https://learn.microsoft.com/windows/apps/windows-sdk/downloads
          # https://learn.microsoft.com/windows/apps/windows-sdk/downloads-archive
          $knownSdkInstallers = @{
            "10.0.28000.2270" = "https://go.microsoft.com/fwlink/?linkid=2370315"
            "10.0.26100.8249" = "https://go.microsoft.com/fwlink/?linkid=2361308"
            "10.0.22621.5040" = "https://go.microsoft.com/fwlink/?linkid=2311806"
            "10.0.20348.3330" = "https://go.microsoft.com/fwlink/?linkid=2331862"
            "10.0.19041.5609" = "https://go.microsoft.com/fwlink/?linkid=2311805"
            "10.0.17763.7010" = "https://go.microsoft.com/fwlink/?linkid=2331960"
            # Out of service SDKs
            "10.0.22000.194" = "https://go.microsoft.com/fwlink/?linkid=2173743"
            "10.0.18362.1" = "https://go.microsoft.com/fwlink/?linkid=2083338"
            "10.0.17134.12" = "https://go.microsoft.com/fwlink/p/?linkid=870807"
            "10.0.16299.91" = "https://go.microsoft.com/fwlink/p/?linkid=864422"
            "10.0.15063.468" = "https://go.microsoft.com/fwlink/p/?LinkId=845298"
            "10.0.14393.795" = "https://go.microsoft.com/fwlink/p/?LinkId=838916"
            "10.0.10586.212" = "https://go.microsoft.com/fwlink/p/?LinkID=698771"
            "10.0.10240" = "https://go.microsoft.com/fwlink/p/?LinkId=619296" # Note: The version will display as 10.0.26624 during setup.
          }

          $matchedKey = $knownSdkInstallers.Keys | Where-Object { Test-SdkVersion $_ $requestedPrefix } | Select-Object -First 1
          if (-not $matchedKey) {
            throw "Windows SDK $requestedPrefix.* isn't already installed and isn't in the known-installer list. Find its standalone installer at https://learn.microsoft.com/windows/apps/windows-sdk/downloads-archive and add it to `$knownSdkInstallers in this step."
          }

          $installerUrl = $knownSdkInstallers[$matchedKey]
          $installerPath = Join-Path $env:RUNNER_TEMP "winsdksetup-$matchedKey.exe"
          Write-Host "Downloading Windows SDK $matchedKey from $installerUrl"
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath -UseBasicParsing

          Write-Host "Installing Windows SDK $matchedKey (silent)..."
          $proc = Start-Process -FilePath $installerPath -ArgumentList "/features + /quiet /norestart /ceip off" -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            throw "Windows SDK $matchedKey installer exited with code $($proc.ExitCode)."
          }

          $installed = Get-ChildItem $sdkIncludeRoot -Directory -ErrorAction SilentlyContinue | Where-Object { Test-SdkVersion $_.Name $requestedPrefix } | Select-Object -First 1
          if (-not $installed) {
            throw "Installer reported success but no folder matching $requestedPrefix.* exists under $sdkIncludeRoot."
          }
          Write-Host "Windows SDK $($installed.Name) installed."

      - name: Build
        shell: pwsh
        working-directory: FrostyFlammenwerferPlugin
        run: >-
          msbuild "FrostyFlammenwerferPlugin.sln"
          -t:Restore,Build
          -p:Configuration="${{ matrix.config }}"
          -p:Platform="x64"
          -p:RestorePackagesConfig=true
          -p:BuildProjectReferences=true
          -maxcpucount
          -verbosity:normal

      - name: Rename and package
        id: package
        shell: pwsh
        working-directory: FrostyFlammenwerferPlugin
        run: |
          $outputPath = "${{ matrix.outputPath }}"
          $dll = Join-Path $outputPath "FsLocalizationPlugin.dll"
          if (-not (Test-Path $dll)) { throw "Expected build output not found: $dll" }

          # The dll itself always keeps this exact name, inside the zip and on disk.
          # Only the zip (and, for Debug, the standalone pdb) get the version/Frosty-target naming.
          $renamedDll = Join-Path $outputPath "FlammenwerferPlugin.dll"
          Copy-Item $dll $renamedDll -Force

          $baseName = "FlammenwerferPlugin_${{ needs.prepare.outputs.version }}_Frosty${{ matrix.suffix }}"

          $zipName = "$baseName.zip"
          Compress-Archive -Path $renamedDll -DestinationPath $zipName -Force
          "zip-name=$zipName" >> $env:GITHUB_OUTPUT

          if ("${{ inputs.build_type }}" -eq "Debug") {
            # Debug build - ship the pdb too, unzipped. Release never ships a pdb.
            $pdb = Join-Path $outputPath "FsLocalizationPlugin.pdb"
            if (Test-Path $pdb) {
              $pdbName = "$baseName.pdb"
              Copy-Item $pdb $pdbName -Force
              "pdb-name=$pdbName" >> $env:GITHUB_OUTPUT
            } else {
              "pdb-name=" >> $env:GITHUB_OUTPUT
            }
          } else {
            "pdb-name=" >> $env:GITHUB_OUTPUT
          }

      - name: Upload DLL
        uses: actions/upload-artifact@v7
        with:
          name: release-asset-${{ matrix.suffix }}
          path: FrostyFlammenwerferPlugin/${{ steps.package.outputs.zip-name }}
          retention-days: 90
          if-no-files-found: error

      - name: Upload PDB (Debug only)
        if: steps.package.outputs.pdb-name != ''
        uses: actions/upload-artifact@v7
        with:
          name: release-asset-${{ matrix.suffix }}-pdb
          path: FrostyFlammenwerferPlugin/${{ steps.package.outputs.pdb-name }}
          retention-days: 90
          if-no-files-found: error

  release:
    needs: [ prepare, build ]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-asset-*
          path: release-assets
          merge-multiple: true

      - name: Create draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.prepare.outputs.tag }}" `
            (Get-ChildItem release-assets -File).FullName `
            --repo "${{ github.repository }}" `
            --target "${{ github.sha }}" `
            --title "${{ needs.prepare.outputs.tag }}" `
            --draft `
            --generate-notes
